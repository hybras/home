---
networks:
  authelia:
    name: 'authelia'
  caddy:
    external: true

volumes:
  authelia-sessions-db:
  authelia-db:
  lldap-data:

secrets:
  JWT_SECRET:
    file: '${PWD}/data/authelia/secrets/JWT_SECRET'
  SESSION_SECRET:
    file: '${PWD}/data/authelia/secrets/SESSION_SECRET'
  STORAGE_PASSWORD:
    file: '${PWD}/data/authelia/secrets/STORAGE_PASSWORD'
  STORAGE_ENCRYPTION_KEY:
    file: '${PWD}/data/authelia/secrets/STORAGE_ENCRYPTION_KEY'
  LLDAP_JWT_SECRET:
    file: '${PWD}/data/lldap/secrets/JWT_SECRET'
  LLDAP_ADMIN_PASSWORD:
    file: '${PWD}/data/lldap/secrets/ADMIN_PASSWORD'
  LLDAP_KEY_SEED:
    file: '${PWD}/data/lldap/secrets/KEY_SEED'

services:
  authelia:
    image: 'authelia/authelia:4.39.16'
    depends_on:
      - db
      - sessions-db
    container_name: 'authelia'
    volumes:
      - '${PWD}/data/authelia/config:/config'    
    networks:
      - authelia
      - caddy
    secrets: ['JWT_SECRET', 'SESSION_SECRET', 'STORAGE_PASSWORD', 'STORAGE_ENCRYPTION_KEY', 'LLDAP_ADMIN_PASSWORD']
    environment:
      TZ: 'US/Eastern'
      AUTHELIA_IDENTITY_VALIDATION_RESET_PASSWORD_JWT_SECRET_FILE: '/run/secrets/JWT_SECRET'
      AUTHELIA_SESSION_SECRET_FILE: '/run/secrets/SESSION_SECRET'
      AUTHELIA_STORAGE_POSTGRES_PASSWORD_FILE: '/run/secrets/STORAGE_PASSWORD'
      AUTHELIA_STORAGE_ENCRYPTION_KEY_FILE: '/run/secrets/STORAGE_ENCRYPTION_KEY'
      AUTHELIA_AUTHENTICATION_BACKEND_LDAP_PASSWORD_FILE: '/run/secrets/LLDAP_ADMIN_PASSWORD'
  
  lldap:
    image: lldap/lldap:stable
    restart: unless-stopped
    container_name: lldap
    networks:
      - authelia
      - caddy
    volumes:
      - lldap-data:/data
      - '${PWD}/data/lldap/lldap_config.toml:/data/lldap_config.toml'
    secrets: ['LLDAP_JWT_SECRET', 'LLDAP_ADMIN_PASSWORD', 'LLDAP_KEY_SEED']
    environment:
      TZ: 'US/Eastern'
      LLDAP_JWT_SECRET_FILE: '/run/secrets/LLDAP_JWT_SECRET'
      LLDAP_LDAP_USER_PASS_FILE: '/run/secrets/LLDAP_ADMIN_PASSWORD'
      LLDAP_KEY_SEED_FILE: '/run/secrets/LLDAP_KEY_SEED'
  sessions-db:
    image: redis:8-alpine
    restart: unless-stopped
    container_name: 'authelia-sessions-db'
    volumes:
      - authelia-sessions-db:/data
    networks:
      - authelia
    mem_limit: 20MiB

  db:
    image: postgres:18 
    restart: unless-stopped
    container_name: 'authelia-db'
    networks:
      - authelia
    volumes:
      - authelia-db:/var/lib/postgresql
    secrets:
      - STORAGE_PASSWORD
    environment:
      - POSTGRES_PASSWORD_FILE=/run/secrets/STORAGE_PASSWORD
      - POSTGRES_USER=authelia
      - POSTGRES_DB=authelia
    mem_limit: 200MiB
