services:
  caddy:
    image: ghcr.io/hybras/caddy:latest
    container_name: caddy
    restart: always
    ports:
      - 80:80 # Needed for the ACME HTTP-01 challenge.
      - 443:443
    volumes:
      - caddy:/data
      - ./Caddyfile:/etc/caddy/Caddyfile
    networks:
      - caddy
    env_file:
      - ./caddy.env
      - ./duckdns.env
    environment:
      - LOG_DIR=/data
    mem_limit: 40MiB
    develop:
      watch:
        - path: ./Caddyfile
          target: /etc/caddy/Caddyfile
          action: sync+exec
          exec:
            command: caddy reload --config /etc/caddy/Caddyfile
          

networks:
  caddy:
    name: caddy
volumes:
  caddy:
    name: caddy
