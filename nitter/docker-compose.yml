volumes:
  nitter-db:
    name: nitter-db
  nitter:
    name: nitter

networks:
  nitter:
    name: nitter
  caddy:
    external: true

configs:
  nitter: { file: ./nitter.conf }

secrets:
  nitter-sessions:
    file: ./sessions.jsonl

services:
  nitter-db:
    image: redis:alpine
    container_name: nitter-db
    restart: unless-stopped
    volumes:
      - nitter-db:/data
    networks:
      - nitter
    mem_limit: 20MiB
  nitter:
    image: zedeus/nitter:latest
    container_name: nitter
    restart: unless-stopped
    depends_on:
      - nitter-db
    volumes:
      - nitter:/data
    secrets:
      - nitter-sessions
    configs:
      - source: nitter
        target: /src/nitter.conf
    networks:
      - nitter
      - caddy
    healthcheck:
      test: wget -nv --tries=1 --spider http://nitter/Jack/status/20 || exit 1
      interval: 60s
      timeout: 5s
      retries: 2
    environment:
      - NITTER_SESSIONS_FILE=/run/secrets/nitter-sessions
    mem_limit: 40MiB
    labels:
      caddy: ${DOMAIN}
      caddy.reverse_proxy: '{{upstreams 80}}'
