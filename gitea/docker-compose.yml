version: "3"

networks:
  gitea:
    name: gitea
  caddy:
    external: true

volumes:
  gitea:
    name: gitea
  gitea-db:
    name: gitea-db

services:
  gitea:
    image: gitea/gitea:1
    container_name: gitea
    restart: always
    networks:
      - gitea
      - caddy
    volumes:
      - gitea:/data
      - ./timezone:/etc/timezone:ro
      # - ./localtime:/etc/localtime:ro
    ports:
      - "2222:22"
    depends_on:
      - gitea-db

  gitea-db:
    image: postgres:14
    container_name: gitea-db
    restart: always
    environment:
      - POSTGRES_USER=gitea
      - POSTGRES_PASSWORD=gitea
      - POSTGRES_DB=gitea
    networks:
      - gitea
    volumes:
      - gitea-db:/var/lib/postgresql/data
      - ./gitea.ini:/data/gitea/conf/app.ini
