version: "3"

networks:
  gitea:
    name: gitea

volumes:
  gitea:
    name: gitea
  gitea-db:
    name: gitea-db


services:
  server:
    image: gitea/gitea:1
    container_name: gitea
    restart: always
    networks:
      - gitea
    volumes:
      - gitea:/data
      - ./timezone:/etc/timezone:ro
      # - ./localtime:/etc/localtime:ro
    ports:
      - "2222:22"
    environment:
      - GITEA__server__DOMAIN=git.hybras.org
      - GITEA__server__HTTP_PORT=80
      - GITEA__server__SSH_PORT=2222
      - GITEA__cors__ENABLED=true
      - GITEA__cors__ALLOW_DOMAIN=hybras.dev
      - GITEA__cors__ALLOW_SUBDOMAIN=true
      - GITEA__database__DB_TYPE=postgres
      - GITEA__database__HOST=gitea-db:5432
      - GITEA__database__NAME=gitea
      - GITEA__database__USER=gitea
      - GITEA__database__PASSWD=gitea
    depends_on:
      - gitea-db

  gitea-db:
    image: postgres:14
    container_name: gitea-db
    restart: always
    environment:
      - POSTGRES_USER=gitea
      - POSTGRES_PASSWORD=gitea
      - POSTGRES_DB=gitea
    networks:
      - gitea
    volumes:
      - gitea-db:/var/lib/postgresql/data
